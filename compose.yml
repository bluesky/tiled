---
services:
  tiled:
    image: ghcr.io/bluesky/tiled:0.2.8
    environment:
      - TILED_SINGLE_USER_API_KEY=${TILED_SINGLE_USER_API_KEY}
      - TILED_CATALOG_URI=postgresql+asyncpg://tiled:${POSTGRES_PASSWORD}@postgres:5432/tiled
      - TILED_STREAMING_CACHE_URI=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - 8000:8000
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: curl --fail http://localhost:8000/healthz || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: docker.io/postgres:16
    environment:
      - POSTGRES_USER=tiled
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=tiled
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: pg_isready -U tiled -d tiled
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: docker.io/redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: redis-cli -a ${REDIS_PASSWORD} ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:

networks:
  backend: {}
